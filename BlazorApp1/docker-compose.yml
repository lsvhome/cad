version: '3.8'

services:
  openscad-modifier:
    build: .
    container_name: openscad-llm
    ports:
      - "8080:8080"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    environment:
      # ScadModifier configuration (overrides appsettings.json)
      - ScadModifier__AiProvider=openai
      - ScadModifier__OpenAiApiKey=${OPENAI_API_KEY}
      - ScadModifier__OpenAiModel=gpt-4o-mini
      - ScadModifier__OllamaBaseUrl=http://host.docker.internal:11434
      - ScadModifier__OllamaModel=llama3.2
      - ScadModifier__InputDir=/app/input
      - ScadModifier__OutputDir=/app/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
